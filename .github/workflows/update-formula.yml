name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "checksums.txt" \
            --dir /tmp

      - name: Update formula
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          SHA_DARWIN_ARM64=$(grep mg_darwin_arm64 /tmp/checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep mg_darwin_amd64 /tmp/checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep mg_linux_arm64 /tmp/checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep mg_linux_amd64 /tmp/checksums.txt | awk '{print $1}')

          cat > Formula/mg.rb <<RUBY
          class Mg < Formula
            desc "MacGuffin — OS-level substrate for agentic workflows built on UNIX primitives"
            homepage "https://github.com/drellem2/macguffin"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/drellem2/macguffin/releases/download/v#{version}/mg_darwin_arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/drellem2/macguffin/releases/download/v#{version}/mg_darwin_amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/drellem2/macguffin/releases/download/v#{version}/mg_linux_arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/drellem2/macguffin/releases/download/v#{version}/mg_linux_amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              binary = stable.url.split("/").last
              bin.install binary => "mg"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mg version 2>&1", 0)
            end
          end
          RUBY

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/mg.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mg.rb
          git diff --cached --quiet && exit 0
          git commit -m "brew: update formula to ${{ github.event.release.tag_name }}"
          git push origin main
